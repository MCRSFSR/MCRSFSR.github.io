<body>
  <div class="window">

      <a href="index.html">主页</a> |

      <a href="news.html">新闻</a>
    </div>
    <div class="content">
      <h2>文章</h2>
      <div id="article-list">
        <div class="articleitem">
          <h3>开服仪式演讲稿</h3>
          <div class="articledate">发布日期：2026-07-11</div>
          <p>尊敬的同志们，大家下午好！感谢大家来参加服务器开服仪式。本服务器深刻吸取经验教训，听取各方合理建议，结合实际情况。本服务器实行 Java-基岩双轨制，以适应不同同志的需要。我们致力于建立一个更加和谐美好的服务器。愿我们在这里度过美好的时光！相信美好的前途！</p>
        </div>
      </div>
      <p style="margin-top:14px;"><a href="index.html">» 返回主页</a> &nbsp; <a href="news.html">» 查看新闻</a> &nbsp; <a href="admin.html">» 管理发布</a></p>
    </div>
    <div class="statusbar">
      <span>© 2026 MCRSFSR</span>
      <span>访客第 000128 位</span>
    </div>
  </div>

  <script>
    const PATH = 'articles.json';
    function escapeHtml(s) {
      return (s || '').replace(/[&<>]/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;' }[c]));
    }
    async function loadArticles() {
      try {
        const res = await fetch(PATH + '?t=' + Date.now());
        if (!res.ok) return;
        const list = await res.json();
        if (!Array.isArray(list) || !list.length) return;
        document.getElementById('article-list').innerHTML = list.map(a => `
          <div class="articleitem">
            <h3>${escapeHtml(a.title)}</h3>
            <div class="articledate">发布日期：${escapeHtml(a.date || '')}${a.author ? ` &nbsp;|&nbsp; 署名：${escapeHtml(a.author)}` : ''}</div>
            <p>${escapeHtml(a.content || '').replace(/\n/g, '<br>')}</p>
          </div>`).join('');
      } catch (e) {
        console.warn('文章动态加载失败（本地预览需部署到 GitHub Pages 后生效）', e);
      }
    }
    loadArticles();
  </script>
</body>
</html>
