<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MCRSFSR - 文章</title>
  <link rel="icon" href="favicon.jpg">
  <style>
    body {
      background: #cfcfcf;
      font-family: Verdana, Tahoma, Arial, sans-serif;
      color: #222;
      margin: 0;
      padding: 20px;
      font-size: 13px;
    }
    .window {
      width: 760px;
      margin: 0 auto;
      background: #ffffff;
      border: 1px solid #808080;
    }
    .titlebar {
      background: linear-gradient(#8b0000, #c62828);
      color: #fff;
      padding: 8px 12px;
      font-weight: bold;
      font-size: 14px;
      border-bottom: 1px solid #808080;
    }
    .navbar {
      background: #e8e8e8;
      padding: 6px 12px;
      border-bottom: 1px solid #808080;
    }
    .navbar a {
      color: #cc0000;
      text-decoration: underline;
      margin-right: 4px;
    }
    .navbar a:hover { color: #ff0000; }
    .content { padding: 20px; }
    .content h2 {
      font-size: 16px;
      color: #b71c1c;
      border-bottom: 1px solid #ccc;
      padding-bottom: 4px;
      margin-top: 0;
    }
    .articleitem {
      border: 1px solid #808080;
      padding: 12px;
      margin-bottom: 16px;
      background: #fafafa;
    }
    .articleitem h3 { margin: 0 0 4px 0; color: #b71c1c; font-size: 14px; }
    .articledate { font-size: 11px; color: #777; margin-bottom: 8px; }
    .statusbar {
      background: #e8e8e8;
      border-top: 1px solid #808080;
      padding: 4px 12px;
      font-size: 11px;
      color: #555;
      display: flex;
      justify-content: space-between;
    }
  </style>
</head>
<body>
  <div class="window">
    <div class="titlebar">■ MCRSFSR Minecraft 服务器</div>
    <div class="navbar">
      <a href="index.html">主页</a> |
      <a href="members.html">成员</a> |
      <a href="articles.html">文章</a> |
      <a href="gallery.html">建筑展示</a> |
      <a href="news.html">新闻</a>
    </div>
    <div class="content">
      <h2>文章</h2>
      <div id="article-list">
        <div class="articleitem">
          <h3>开服仪式演讲稿</h3>
          <div class="articledate">发布日期：2026-07-11</div>
          <p>尊敬的同志们，大家下午好！感谢大家来参加服务器开服仪式。本服务器深刻吸取经验教训，听取各方合理建议，结合实际情况。本服务器实行 Java-基岩双轨制，以适应不同同志的需要。我们致力于建立一个更加和谐美好的服务器。愿我们在这里度过美好的时光！相信美好的前途！</p>
        </div>
      </div>
      <p style="margin-top:14px;"><a href="index.html">» 返回主页</a> &nbsp; <a href="news.html">» 查看新闻</a> &nbsp; <a href="admin.html">» 管理发布</a></p>
    </div>
    <div class="statusbar">
      <span>© 2026 MCRSFSR</span>
      <span>访客第 000128 位</span>
    </div>
  </div>

  <script>
    const PATH = 'articles.json';
    function escapeHtml(s) {
      return (s || '').replace(/[&<>]/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;' }[c]));
    }
    async function loadArticles() {
      try {
        const res = await fetch(PATH + '?t=' + Date.now());
        if (!res.ok) return;
        const list = await res.json();
        if (!Array.isArray(list) || !list.length) return;
        document.getElementById('article-list').innerHTML = list.map(a => `
          <div class="articleitem">
            <h3>${escapeHtml(a.title)}</h3>
            <div class="articledate">发布日期：${escapeHtml(a.date || '')}</div>
            <p>${escapeHtml(a.content || '').replace(/\n/g, '<br>')}</p>
          </div>`).join('');
      } catch (e) {
        console.warn('文章动态加载失败（本地预览需部署到 GitHub Pages 后生效）', e);
      }
    }
    loadArticles();
  </script>
</body>
</html>
