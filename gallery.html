<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MCRSFSR - 建筑展示</title>
  <link rel="icon" href="favicon.jpg">
  <style>
    body {
      background: #cfcfcf;
      font-family: Verdana, Tahoma, Arial, sans-serif;
      color: #222;
      margin: 0;
      padding: 20px;
      font-size: 13px;
    }
    .window {
      width: 760px;
      margin: 0 auto;
      background: #ffffff;
      border: 1px solid #808080;
    }
    .titlebar {
      background: linear-gradient(#8b0000, #c62828);
      color: #fff;
      padding: 8px 12px;
      font-weight: bold;
      font-size: 14px;
      border-bottom: 1px solid #808080;
    }
    .navbar {
      background: #e8e8e8;
      padding: 6px 12px;
      border-bottom: 1px solid #808080;
    }
    .navbar a {
      color: #cc0000;
      text-decoration: underline;
      margin-right: 4px;
    }
    .navbar a:hover { color: #ff0000; }
    .content { padding: 20px; }
    .content h2 {
      font-size: 16px;
      color: #b71c1c;
      border-bottom: 1px solid #ccc;
      padding-bottom: 4px;
      margin-top: 0;
    }
    .builditem {
      border: 1px solid #808080;
      padding: 12px;
      margin-bottom: 16px;
      background: #fafafa;
    }
    .builditem h3 { margin: 0 0 4px 0; color: #b71c1c; font-size: 14px; }
    .builddate { font-size: 11px; color: #777; margin-bottom: 8px; }
    .builditem img {
      max-width: 100%;
      border: 1px solid #808080;
      margin: 8px 0;
      display: block;
    }
    .empty {
      border: 1px dashed #c62828;
      padding: 30px;
      text-align: center;
      color: #999;
      background: #fafafa;
    }
    .statusbar {
      background: #e8e8e8;
      border-top: 1px solid #808080;
      padding: 4px 12px;
      font-size: 11px;
      color: #555;
      display: flex;
      justify-content: space-between;
    }
    /* ===== 复古1950风 ===== */
    body {
      background: #241a12;
      font-family: Georgia, "Times New Roman", "Songti SC", serif;
      color: #2a2118;
      padding: 24px;
    }
    .window {
      box-sizing: border-box;
      width: 820px; max-width: 100%; margin: 0 auto;
      background: #ece1c4;
      border: 3px double #9e1b1b;
      box-shadow: 0 0 0 6px #ece1c4, 0 0 0 9px #caa64a, 0 16px 44px rgba(0,0,0,.55);
    }
    .titlebar {
      background: linear-gradient(#9e1b1b, #c1121f);
      color: #f3e6c4;
      border-bottom: 3px double #caa64a;
      text-align: center;
      font-weight: bold;
      letter-spacing: 2px;
      text-shadow: 1px 1px 0 #5a0d0d;
    }
    .navbar {
      background: #d9c9a0;
      border-bottom: 2px solid #9e1b1b;
      text-align: center;
      font-family: Georgia, "Times New Roman", "Songti SC", serif;
    }
    .navbar a {
      color: #9e1b1b; font-weight: bold;
      text-decoration: underline; letter-spacing: 1px;
    }
    .navbar a:hover { color: #caa64a; }
    .content {
      background:
        repeating-linear-gradient(0deg, rgba(90,40,20,.04) 0 1px, transparent 1px 4px),
        #ece1c4;
      padding: 22px;
    }
    .content h2 {
      font-size: 22px; color: #9e1b1b;
      border-bottom: 3px double #caa64a;
      padding-bottom: 6px; margin-top: 0;
      letter-spacing: 2px; font-weight: 900;
    }
    .content h2::before { content: "★ "; color: #caa64a; }
    a { color: #9e1b1b; }
    a:hover { color: #caa64a; }
    .statusbar {
      background: #9e1b1b; color: #f3e6c4;
      border-top: 3px double #caa64a;
      font-family: Georgia, "Times New Roman", "Songti SC", serif;
      letter-spacing: 1px; font-weight: bold;
    }
    .builditem {
      border: 2px solid #9e1b1b;
      border-left: 8px solid #9e1b1b;
      padding: 14px 16px; margin-bottom: 18px;
      background: #f3e6c4;
    }
    .builditem h3 { color: #9e1b1b; font-weight: 900; letter-spacing: 1px; }
    .builddate { color: #7a1414; font-weight: bold; }
    .builditem img { border: 2px solid #9e1b1b; }
    .empty { border: 2px dashed #9e1b1b; color: #7a1414; background: #f3e6c4; }

    @media (max-width: 768px) {
      body { padding: 8px; }
      .window { width: 100%; max-width: 100%; }
      .navbar { font-size: 12px; word-break: break-word; }
      .navbar a { margin-right: 2px; }
      .content { padding: 14px; }
      .statusbar { font-size: 10px; flex-direction: column; gap: 2px; }
      input, textarea, select { font-size: 16px; }
    }
  </style>
</head>
<body>
  <div class="window">
    <div class="titlebar">■ MCRSFSR Minecraft 服务器</div>
    <div class="navbar">
      <a href="index.html">主页</a> |
      <a href="members.html">成员</a> |
      <a href="articles.html">文章</a> |
      <a href="gallery.html">建筑展示</a> |
      <a href="guestbook.html">留言</a> |
      <a href="news.html">新闻</a>
    </div>
    <div class="content">
      <h2>建筑展示</h2>
      <div id="gallery-list">
        <div class="empty">暂无建筑作品，敬请期待。</div>
      </div>
      <p style="margin-top:14px;"><a href="index.html">» 返回主页</a> &nbsp; <a href="news.html">» 查看新闻</a> &nbsp; <a href="admin.html">» 管理发布</a></p>
    </div>
    <div class="statusbar">
      <span>© 2026 MCRSFSR</span>
      <span>访客第 000128 位</span>
    </div>
  </div>

  <script>
    const PATH = 'gallery.json';
    function escapeHtml(s) {
      return (s || '').replace(/[&<>]/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;' }[c]));
    }
    function escapeAttr(s) {
      return escapeHtml(s).replace(/"/g, '&quot;');
    }
    async function loadGallery() {
      try {
        const res = await fetch(PATH + '?t=' + Date.now());
        if (!res.ok) return;
        const list = await res.json();
        if (!Array.isArray(list)) return;
        const box = document.getElementById('gallery-list');
        if (!list.length) {
          box.innerHTML = '<div class="empty">暂无建筑作品，敬请期待。</div>';
          return;
        }
        box.innerHTML = list.map(b => `
          <div class="builditem">
            <h3>${escapeHtml(b.title)}</h3>
            <div class="builddate">建造者：${escapeHtml(b.builder || '匿名')} ｜ 日期：${escapeHtml(b.date || '')}${b.author ? ` ｜ 署名：${escapeHtml(b.author)}` : ''}</div>
            ${b.image ? `<img src="${escapeAttr(b.image)}" alt="建筑图片">` : ''}
            <p>${escapeHtml(b.content || '').replace(/\n/g, '<br>')}</p>
          </div>`).join('');
      } catch (e) {
        console.warn('建筑动态加载失败（本地预览需部署到 GitHub Pages 后生效）', e);
      }
    }
    loadGallery();
  </script>
</body>
</html>
