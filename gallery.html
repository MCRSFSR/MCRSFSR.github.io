<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MCRSFSR - 建筑展示</title>
  <link rel="icon" href="favicon.jpg">
  <style>
    body {
      background: #cfcfcf;
      font-family: Verdana, Tahoma, Arial, sans-serif;
      color: #222;
      margin: 0;
      padding: 20px;
      font-size: 13px;
    }
    .window {
      width: 760px;
      margin: 0 auto;
      background: #ffffff;
      border: 1px solid #808080;
    }
    .titlebar {
      background: linear-gradient(#8b0000, #c62828);
      color: #fff;
      padding: 8px 12px;
      font-weight: bold;
      font-size: 14px;
      border-bottom: 1px solid #808080;
    }
    .navbar {
      background: #e8e8e8;
      padding: 6px 12px;
      border-bottom: 1px solid #808080;
    }
    .navbar a {
      color: #cc0000;
      text-decoration: underline;
      margin-right: 4px;
    }
    .navbar a:hover { color: #ff0000; }
    .content { padding: 20px; }
    .content h2 {
      font-size: 16px;
      color: #b71c1c;
      border-bottom: 1px solid #ccc;
      padding-bottom: 4px;
      margin-top: 0;
    }
    .builditem {
      border: 1px solid #808080;
      padding: 12px;
      margin-bottom: 16px;
      background: #fafafa;
    }
    .builditem h3 { margin: 0 0 4px 0; color: #b71c1c; font-size: 14px; }
    .builddate { font-size: 11px; color: #777; margin-bottom: 8px; }
    .builditem img {
      max-width: 100%;
      border: 1px solid #808080;
      margin: 8px 0;
      display: block;
    }
    .empty {
      border: 1px dashed #c62828;
      padding: 30px;
      text-align: center;
      color: #999;
      background: #fafafa;
    }
    .statusbar {
      background: #e8e8e8;
      border-top: 1px solid #808080;
      padding: 4px 12px;
      font-size: 11px;
      color: #555;
      display: flex;
      justify-content: space-between;
    }
  </style>
</head>
<body>
  <div class="window">
    <div class="titlebar">■ MCRSFSR Minecraft 服务器</div>
    <div class="navbar">
      <a href="index.html">主页</a> |
      <a href="members.html">成员</a> |
      <a href="articles.html">文章</a> |
      <a href="gallery.html">建筑展示</a> |
      <a href="news.html">新闻</a>
    </div>
    <div class="content">
      <h2>建筑展示</h2>
      <div id="gallery-list">
        <div class="empty">暂无建筑作品，敬请期待。</div>
      </div>
      <p style="margin-top:14px;"><a href="index.html">» 返回主页</a> &nbsp; <a href="news.html">» 查看新闻</a> &nbsp; <a href="admin.html">» 管理发布</a></p>
    </div>
    <div class="statusbar">
      <span>© 2026 MCRSFSR</span>
      <span>访客第 000128 位</span>
    </div>
  </div>

  <script>
    const PATH = 'gallery.json';
    function escapeHtml(s) {
      return (s || '').replace(/[&<>]/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;' }[c]));
    }
    function escapeAttr(s) {
      return escapeHtml(s).replace(/"/g, '&quot;');
    }
    async function loadGallery() {
      try {
        const res = await fetch(PATH + '?t=' + Date.now());
        if (!res.ok) return;
        const list = await res.json();
        if (!Array.isArray(list)) return;
        const box = document.getElementById('gallery-list');
        if (!list.length) {
          box.innerHTML = '<div class="empty">暂无建筑作品，敬请期待。</div>';
          return;
        }
        box.innerHTML = list.map(b => `
          <div class="builditem">
            <h3>${escapeHtml(b.title)}</h3>
            <div class="builddate">建造者：${escapeHtml(b.builder || '匿名')} ｜ 日期：${escapeHtml(b.date || '')}${b.author ? ` ｜ 署名：${escapeHtml(b.author)}` : ''}</div>
            ${b.image ? `<img src="${escapeAttr(b.image)}" alt="建筑图片">` : ''}
            <p>${escapeHtml(b.content || '').replace(/\n/g, '<br>')}</p>
          </div>`).join('');
      } catch (e) {
        console.warn('建筑动态加载失败（本地预览需部署到 GitHub Pages 后生效）', e);
      }
    }
    loadGallery();
  </script>
</body>
</html>
