    .window {

    .titlebar {
      background: linear-gradient(#8b0000, #c62828);

      border: 1px solid #808080;
      padding: 12px;
      margin-bottom: 16px;
      background: #fafafa;
    }
    .builditem h3 { margin: 0 0 4px 0; color: #b71c1c; font-size: 14px; }
    .builddate { font-size: 11px; color: #777; margin-bottom: 8px; }
    .builditem img {
      max-width: 100%;
      border: 1px solid #808080;
      margin: 8px 0;
      display: block;
    }
    .empty {
      border: 1px dashed #c62828;
      padding: 30px;
      text-align: center;
      color: #999;
      background: #fafafa;
    }
    .statusbar {
      background: #e8e8e8;
      border-top: 1px solid #808080;
      padding: 4px 12px;
      font-size: 11px;
      color: #555;
      display: flex;
