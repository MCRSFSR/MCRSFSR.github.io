<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MCRSFSR - 成员</title>
  <link rel="icon" href="favicon.jpg">
  <style>
    body {
      background: #cfcfcf;
      font-family: Verdana, Tahoma, Arial, sans-serif;
      color: #222;
      margin: 0;
      padding: 20px;
      font-size: 13px;
    }
    .window {
      width: 760px;
      margin: 0 auto;
      background: #ffffff;
      border: 1px solid #808080;
    }
    .titlebar {
      background: linear-gradient(#8b0000, #c62828);
      color: #fff;
      padding: 8px 12px;
      font-weight: bold;
      font-size: 14px;
      border-bottom: 1px solid #808080;
    }
    .navbar {
      background: #e8e8e8;
      padding: 6px 12px;
      border-bottom: 1px solid #808080;
    }
    .navbar a {
      color: #cc0000;
      text-decoration: underline;
      margin-right: 4px;
    }
    .navbar a:hover { color: #ff0000; }
    .content { padding: 20px; }
    .content h2 {
      font-size: 16px;
      color: #b71c1c;
      border-bottom: 1px solid #ccc;
      padding-bottom: 4px;
      margin-top: 0;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 10px;
    }
    th, td {
      border: 1px solid #808080;
      padding: 6px 10px;
      text-align: left;
      vertical-align: top;
    }
    th { background: #c62828; color: #fff; }
    tr:nth-child(even) { background: #f0f0f0; }
    .statusbar {
      background: #e8e8e8;
      border-top: 1px solid #808080;
      padding: 4px 12px;
      font-size: 11px;
      color: #555;
      display: flex;
      justify-content: space-between;
    }
    /* ===== 复古1950风 ===== */
    body {
      background: #241a12;
      font-family: Georgia, "Times New Roman", "Songti SC", serif;
      color: #2a2118;
      padding: 24px;
    }
    .window {
      box-sizing: border-box;
      width: 820px; max-width: 100%; margin: 0 auto;
      background: #ece1c4;
      border: 3px double #9e1b1b;
      box-shadow: 0 0 0 6px #ece1c4, 0 0 0 9px #caa64a, 0 16px 44px rgba(0,0,0,.55);
    }
    .titlebar {
      background: linear-gradient(#9e1b1b, #c1121f);
      color: #f3e6c4;
      border-bottom: 3px double #caa64a;
      text-align: center;
      font-weight: bold;
      letter-spacing: 2px;
      text-shadow: 1px 1px 0 #5a0d0d;
    }
    .navbar {
      background: #d9c9a0;
      border-bottom: 2px solid #9e1b1b;
      text-align: center;
      font-family: Georgia, "Times New Roman", "Songti SC", serif;
    }
    .navbar a {
      color: #9e1b1b; font-weight: bold;
      text-decoration: underline; letter-spacing: 1px;
    }
    .navbar a:hover { color: #caa64a; }
    .content {
      background:
        repeating-linear-gradient(0deg, rgba(90,40,20,.04) 0 1px, transparent 1px 4px),
        #ece1c4;
      padding: 22px;
    }
    .content h2 {
      font-size: 22px; color: #9e1b1b;
      border-bottom: 3px double #caa64a;
      padding-bottom: 6px; margin-top: 0;
      letter-spacing: 2px; font-weight: 900;
    }
    .content h2::before { content: "★ "; color: #caa64a; }
    a { color: #9e1b1b; }
    a:hover { color: #caa64a; }
    .statusbar {
      background: #9e1b1b; color: #f3e6c4;
      border-top: 3px double #caa64a;
      font-family: Georgia, "Times New Roman", "Songti SC", serif;
      letter-spacing: 1px; font-weight: bold;
    }
    table { border: 2px solid #9e1b1b; }
    th, td { border: 1px solid #9e1b1b; padding: 8px 10px; }
    th { background: #9e1b1b; color: #f3e6c4; letter-spacing: 1px; }
    tbody tr:nth-child(even) { background: #f3e6c4; }
    tbody tr:nth-child(odd) { background: #ece1c4; }

    @media (max-width: 768px) {
      body { padding: 8px; }
      .window { width: 100%; max-width: 100%; }
      .navbar { font-size: 12px; word-break: break-word; }
      .navbar a { margin-right: 2px; }
      .content { padding: 14px; }
      .statusbar { font-size: 10px; flex-direction: column; gap: 2px; }
      table { font-size: 12px; }
      th, td { padding: 5px 6px; }
      input, textarea, select { font-size: 16px; }
    }
  </style>
</head>
<body>
  <div class="window">
    <div class="titlebar">■ MCRSFSR Minecraft 服务器</div>
    <div class="navbar">
      <a href="index.html">主页</a> |
      <a href="members.html">成员</a> |
      <a href="articles.html">文章</a> |
      <a href="gallery.html">建筑展示</a> |
      <a href="guestbook.html">留言</a> |
      <a href="news.html">新闻</a>
    </div>
    <div class="content">
      <h2>团队成员</h2>
      <p>以下为本服务器成员（游戏 ID / 职务 / 简介），欢迎各位同志加入！</p>
      <table>
        <thead>
          <tr><th>ID</th><th>职务</th><th>简介</th></tr>
        </thead>
        <tbody id="member-list">
          <!-- 静态 fallback：本地预览时显示；部署后由 members.json 动态覆盖 -->
          <tr><td>Revolutionary</td><td>联布第一书记</td><td></td></tr>
          <tr><td>白芝麻热干面</td><td>主席</td><td></td></tr>
          <tr><td>НикитичНикита Кулиk</td><td>副主席</td><td></td></tr>
          <tr><td>太初</td><td>工科部部长</td><td></td></tr>
        </tbody>
      </table>
      <p style="margin-top:14px;"><a href="index.html">» 返回主页</a> &nbsp; <a href="news.html">» 查看新闻</a> &nbsp; <a href="admin.html">» 管理发布（添加成员）</a></p>
    </div>
    <div class="statusbar">
      <span>© 2026 MCRSFSR</span>
      <span>访客第 000128 位</span>
    </div>
  </div>

  <script>
    const PATH = 'members.json';
    function escapeHtml(s) {
      return (s || '').replace(/[&<>]/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;' }[c]));
    }
    async function loadMembers() {
      try {
        const res = await fetch(PATH + '?t=' + Date.now());
        if (!res.ok) return;
        const list = await res.json();
        if (!Array.isArray(list)) return;
        document.getElementById('member-list').innerHTML = list.map(m => `
          <tr>
            <td>${escapeHtml(m.id)}</td>
            <td>${escapeHtml(m.role || '')}${m.author ? ` <span style="color:#999;font-size:11px;">（提交：${escapeHtml(m.author)}）</span>` : ''}</td>
            <td>${escapeHtml(m.intro || '').replace(/\n/g, '<br>')}</td>
          </tr>`).join('');
      } catch (e) {
        console.warn('成员动态加载失败（本地预览需部署到 GitHub Pages 后生效）', e);
      }
    }
    loadMembers();
  </script>
</body>
</html>
