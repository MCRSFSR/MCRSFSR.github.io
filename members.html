<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MCRSFSR - 成员</title>
  <link rel="icon" href="favicon.jpg">
  <style>
    body {
      background: #cfcfcf;
      font-family: Verdana, Tahoma, Arial, sans-serif;
      color: #222;
      margin: 0;
      padding: 20px;
      font-size: 13px;
    }
    .window {
      width: 760px;
      margin: 0 auto;
      background: #ffffff;
      border: 1px solid #808080;
    }
    .titlebar {
      background: linear-gradient(#8b0000, #c62828);
      color: #fff;
      padding: 8px 12px;
      font-weight: bold;
      font-size: 14px;
      border-bottom: 1px solid #808080;
    }
    .navbar {
      background: #e8e8e8;
      padding: 6px 12px;
      border-bottom: 1px solid #808080;
    }
    .navbar a {
      color: #cc0000;
      text-decoration: underline;
      margin-right: 4px;
    }
    .navbar a:hover { color: #ff0000; }
    .content { padding: 20px; }
    .content h2 {
      font-size: 16px;
      color: #b71c1c;
      border-bottom: 1px solid #ccc;
      padding-bottom: 4px;
      margin-top: 0;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 10px;
    }
    th, td {
      border: 1px solid #808080;
      padding: 6px 10px;
      text-align: left;
      vertical-align: top;
    }
    th { background: #c62828; color: #fff; }
    tr:nth-child(even) { background: #f0f0f0; }
    .statusbar {
      background: #e8e8e8;
      border-top: 1px solid #808080;
      padding: 4px 12px;
      font-size: 11px;
      color: #555;
      display: flex;
      justify-content: space-between;
    }
  </style>
</head>
<body>
  <div class="window">
    <div class="titlebar">■ MCRSFSR Minecraft 服务器</div>
    <div class="navbar">
      <a href="index.html">主页</a> |
      <a href="members.html">成员</a> |
      <a href="articles.html">文章</a> |
      <a href="gallery.html">建筑展示</a> |
      <a href="news.html">新闻</a>
    </div>
    <div class="content">
      <h2>团队成员</h2>
      <p>以下为本服务器成员（游戏 ID / 职务 / 简介），欢迎各位同志加入！</p>
      <table>
        <thead>
          <tr><th>ID</th><th>职务</th><th>简介</th></tr>
        </thead>
        <tbody id="member-list">
          <!-- 静态 fallback：本地预览时显示；部署后由 members.json 动态覆盖 -->
          <tr><td>Revolutionary</td><td>联布第一书记</td><td></td></tr>
          <tr><td>白芝麻热干面</td><td>主席</td><td></td></tr>
          <tr><td>НикитичНикита Кулиk</td><td>副主席</td><td></td></tr>
          <tr><td>太初</td><td>工科部部长</td><td></td></tr>
        </tbody>
      </table>
      <p style="margin-top:14px;"><a href="index.html">» 返回主页</a> &nbsp; <a href="news.html">» 查看新闻</a> &nbsp; <a href="admin.html">» 管理发布（添加成员）</a></p>
    </div>
    <div class="statusbar">
      <span>© 2026 MCRSFSR</span>
      <span>访客第 000128 位</span>
    </div>
  </div>

  <script>
    const PATH = 'members.json';
    function escapeHtml(s) {
      return (s || '').replace(/[&<>]/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;' }[c]));
    }
    async function loadMembers() {
      try {
        const res = await fetch(PATH + '?t=' + Date.now());
        if (!res.ok) return;
        const list = await res.json();
        if (!Array.isArray(list)) return;
        document.getElementById('member-list').innerHTML = list.map(m => `
          <tr>
            <td>${escapeHtml(m.id)}</td>
            <td>${escapeHtml(m.role || '')}${m.author ? ` <span style="color:#999;font-size:11px;">（提交：${escapeHtml(m.author)}）</span>` : ''}</td>
            <td>${escapeHtml(m.intro || '').replace(/\n/g, '<br>')}</td>
          </tr>`).join('');
      } catch (e) {
        console.warn('成员动态加载失败（本地预览需部署到 GitHub Pages 后生效）', e);
      }
    }
    loadMembers();
  </script>
</body>
</html>
