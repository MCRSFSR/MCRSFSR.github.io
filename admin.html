<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MCRSFSR - 管理发布</title>
  <link rel="icon" href="favicon.jpg">
  <style>
    body {
      background: #cfcfcf;
      font-family: Verdana, Tahoma, Arial, sans-serif;
      color: #222;
      margin: 0;
      padding: 20px;
      font-size: 13px;
    }
    .window {
      width: 760px;
      margin: 0 auto;
      background: #ffffff;
      border: 1px solid #808080;
    }
    .titlebar {
      background: linear-gradient(#8b0000, #c62828);
      color: #fff;
      padding: 8px 12px;
      font-weight: bold;
      font-size: 14px;
      border-bottom: 1px solid #808080;
    }
    .navbar {
      background: #e8e8e8;
      padding: 6px 12px;
      border-bottom: 1px solid #808080;
    }
    .navbar a {
      color: #cc0000;
      text-decoration: underline;
      margin-right: 4px;
    }
    .navbar a:hover { color: #ff0000; }
    .content { padding: 20px; }
    .content h2 {
      font-size: 16px;
      color: #b71c1c;
      border-bottom: 1px solid #ccc;
      padding-bottom: 4px;
      margin-top: 0;
    }
    label { display: block; margin-top: 12px; font-weight: bold; color: #444; }
    input, textarea, select {
      width: 100%;
      padding: 6px 8px;
      margin-top: 4px;
      border: 1px solid #808080;
      font-family: Verdana, Tahoma, Arial, sans-serif;
      font-size: 13px;
      box-sizing: border-box;
    }
    textarea { height: 140px; resize: vertical; }
    .row { background: #fbe9e7; border: 1px solid #c62828; padding: 10px 12px; margin: 10px 0; }
    .hidden { display: none; }
    .dropzone {
      margin-top: 4px;
      border: 2px dashed #c62828;
      background: #fff5f5;
      padding: 18px;
      text-align: center;
      color: #c62828;
      cursor: pointer;
      font-size: 12px;
      line-height: 1.6;
    }
    .dropzone.hover { background: #ffe3e3; }
    .dropzone img { max-width: 100%; max-height: 160px; display: block; margin: 8px auto 0; border: 1px solid #808080; }
    button {
      margin-top: 14px;
      background: linear-gradient(#8b0000, #c62828);
      color: #fff;
      border: 1px solid #808080;
      padding: 8px 18px;
      font-weight: bold;
      cursor: pointer;
      font-family: Verdana, Tahoma, Arial, sans-serif;
    }
    button:hover { background: #b71c1c; }
    #msg { margin-top: 12px; font-weight: bold; }
    .tip { color: #b71c1c; font-size: 12px; }
    .statusbar {
      background: #e8e8e8;
      border-top: 1px solid #808080;
      padding: 4px 12px;
      font-size: 11px;
      color: #555;
      display: flex;
      justify-content: space-between;
    }
    /* ===== 复古1950风 ===== */
    body {
      background: #241a12;
      font-family: Georgia, "Times New Roman", "Songti SC", serif;
      color: #2a2118;
      padding: 24px;
    }
    .window {
      box-sizing: border-box;
      width: 820px; max-width: 100%; margin: 0 auto;
      background: #ece1c4;
      border: 3px double #9e1b1b;
      box-shadow: 0 0 0 6px #ece1c4, 0 0 0 9px #caa64a, 0 16px 44px rgba(0,0,0,.55);
    }
    .titlebar {
      background: linear-gradient(#9e1b1b, #c1121f);
      color: #f3e6c4;
      border-bottom: 3px double #caa64a;
      text-align: center;
      font-weight: bold;
      letter-spacing: 2px;
      text-shadow: 1px 1px 0 #5a0d0d;
    }
    .navbar {
      background: #d9c9a0;
      border-bottom: 2px solid #9e1b1b;
      text-align: center;
      font-family: Georgia, "Times New Roman", "Songti SC", serif;
    }
    .navbar a {
      color: #9e1b1b; font-weight: bold;
      text-decoration: underline; letter-spacing: 1px;
    }
    .navbar a:hover { color: #caa64a; }
    .content {
      background:
        repeating-linear-gradient(0deg, rgba(90,40,20,.04) 0 1px, transparent 1px 4px),
        #ece1c4;
      padding: 22px;
    }
    .content h2 {
      font-size: 22px; color: #9e1b1b;
      border-bottom: 3px double #caa64a;
      padding-bottom: 6px; margin-top: 0;
      letter-spacing: 2px; font-weight: 900;
    }
    .content h2::before { content: "★ "; color: #caa64a; }
    a { color: #9e1b1b; }
    a:hover { color: #caa64a; }
    label { color: #7a1414; }
    input, textarea, select {
      border: 2px solid #9e1b1b;
      background: #f3e6c4;
      color: #2a2118;
      font-family: Georgia, "Times New Roman", "Songti SC", serif;
    }
    button {
      background: linear-gradient(#7a1414, #c1121f);
      color: #f3e6c4;
      border: 2px solid #caa64a;
      font-family: Georgia, "Times New Roman", "Songti SC", serif;
      letter-spacing: 1px;
    }
    button:hover { background: #9e1b1b; }
    .row { background: #f3e6c4; border: 2px solid #9e1b1b; }
    .dropzone { border: 2px dashed #9e1b1b; background: #f3e6c4; color: #7a1414; }
    .dropzone.hover { background: #ffe9c0; }
    .tip { color: #7a1414; }
    #msg { color: #7a1414; }
    .statusbar {
      background: #9e1b1b; color: #f3e6c4;
      border-top: 3px double #caa64a;
      font-family: Georgia, "Times New Roman", "Songti SC", serif;
      letter-spacing: 1px; font-weight: bold;
    }

    @media (max-width: 768px) {
      body { padding: 8px; }
      .window { width: 100%; max-width: 100%; }
      .navbar { font-size: 12px; word-break: break-word; }
      .navbar a { margin-right: 2px; }
      .content { padding: 14px; }
      .statusbar { font-size: 10px; flex-direction: column; gap: 2px; }
      input, textarea, select { font-size: 16px; }
      .dropzone { padding: 14px; }
    }
  </style>
</head>
<body>
  <div class="window">
    <div class="titlebar">■ MCRSFSR 管理发布</div>
    <div class="navbar">
      <a href="index.html">主页</a> |
      <a href="members.html">成员</a> |
      <a href="articles.html">文章</a> |
      <a href="gallery.html">建筑展示</a> |
      <a href="guestbook.html">留言</a> |
      <a href="news.html">新闻</a>
    </div>
    <div class="content">
      <h2>发布内容</h2>
      <p class="tip">本页仅供管理员使用。PAT 仅保存在你本地浏览器（localStorage），不会上传。请勿在公共电脑保存，且不要把仓库写权限 PAT 泄露给不信任的人。</p>

      <div class="row">
        <label for="pat">GitHub PAT（个人访问令牌）</label>
        <input type="password" id="pat" placeholder="粘贴你的 PAT，点击保存">
        <button type="button" id="savePat">保存 PAT</button>
        <span id="patStatus"></span>
      </div>

      <form id="publish-form">
        <label for="type">发布类型</label>
        <select id="type">
          <option value="news">新闻</option>
          <option value="articles">文章</option>
          <option value="gallery">建筑展示</option>
          <option value="members">成员</option>
        </select>

        <div class="field">
          <label for="title" id="titleLabel">标题 / 名称</label>
          <input type="text" id="title" placeholder="如：服务器维护公告">
        </div>

        <div class="field">
          <label for="author">署名（自己填写，可选）</label>
          <input type="text" id="author" placeholder="如：你的玩家ID / 职务">
        </div>

        <div class="field hidden" id="roleField">
          <label for="role" id="roleLabel">建造者</label>
          <input type="text" id="role" placeholder="玩家ID">
        </div>

        <div class="field" id="dateField">
          <label for="date">发布日期</label>
          <input type="date" id="date">
        </div>

        <div class="field" id="imageField">
          <label>图片（拖拽到下方或点击选择，可选）</label>
          <div class="dropzone" id="dropZone">
            <span id="dropText">将图片拖到这里，或点击选择文件</span>
            <img id="preview" class="hidden" alt="预览">
          </div>
          <input type="file" id="fileInput" accept="image/*" class="hidden">
          <div id="uploadStatus" class="tip"></div>
        </div>

        <div class="field">
          <label for="content" id="contentLabel">内容 / 简介</label>
          <textarea id="content" placeholder="在这里写正文……"></textarea>
        </div>

        <button type="button" id="publish">发布</button>
      </form>

      <div id="msg"></div>
      <p style="margin-top:14px;"><a href="news.html">» 查看新闻</a> &nbsp; <a href="articles.html">» 文章</a> &nbsp; <a href="gallery.html">» 建筑</a> &nbsp; <a href="members.html">» 成员</a></p>
    </div>
    <div class="statusbar">
      <span>© 2026 MCRSFSR</span>
      <span>管理后台</span>
    </div>
  </div>

  <script>
    const REPO = 'MCRSFSR/MCRSFSR.github.io';
    const BRANCH = 'main';
    const PATHS = { news: 'news.json', articles: 'articles.json', gallery: 'gallery.json', members: 'members.json' };

    // PAT 本地保存
    const patInput = document.getElementById('pat');
    const patStatus = document.getElementById('patStatus');
    if (localStorage.getItem('gh_pat')) {
      patInput.value = localStorage.getItem('gh_pat');
      patStatus.textContent = '（已保存）';
    }
    document.getElementById('savePat').onclick = () => {
      const v = patInput.value.trim();
      if (!v) { alert('请先粘贴 PAT'); return; }
      localStorage.setItem('gh_pat', v);
      patStatus.textContent = '（已保存）';
      alert('PAT 已保存到本地浏览器。');
    };

    // 类型切换：显示/隐藏对应字段并调整文案
    const typeSel = document.getElementById('type');
    const titleInput = document.getElementById('title');
    const titleLabel = document.getElementById('titleLabel');
    const roleField = document.getElementById('roleField');
    const roleLabel = document.getElementById('roleLabel');
    const roleInput = document.getElementById('role');
    const dateField = document.getElementById('dateField');
    const imageField = document.getElementById('imageField');
    const contentLabel = document.getElementById('contentLabel');

    function syncType() {
      const t = typeSel.value;
      if (t === 'news') {
        titleLabel.textContent = '标题'; titleInput.placeholder = '如：服务器维护公告';
        roleField.classList.add('hidden');
        dateField.classList.remove('hidden');
        imageField.classList.remove('hidden');
        contentLabel.textContent = '内容';
      } else if (t === 'articles') {
        titleLabel.textContent = '标题'; titleInput.placeholder = '如：文章标题';
        roleField.classList.add('hidden');
        dateField.classList.remove('hidden');
        imageField.classList.add('hidden');
        contentLabel.textContent = '内容';
      } else if (t === 'gallery') {
        titleLabel.textContent = '名称'; titleInput.placeholder = '如：中央大厦';
        roleLabel.textContent = '建造者'; roleInput.placeholder = '玩家ID';
        roleField.classList.remove('hidden');
        dateField.classList.remove('hidden');
        imageField.classList.remove('hidden');
        contentLabel.textContent = '简介';
      } else if (t === 'members') {
        titleLabel.textContent = '游戏 ID'; titleInput.placeholder = '如：你的游戏ID';
        roleLabel.textContent = '职务'; roleInput.placeholder = '如：部长';
        roleField.classList.remove('hidden');
        dateField.classList.add('hidden');
        imageField.classList.add('hidden');
        contentLabel.textContent = '简介（可选）';
      }
    }
    typeSel.onchange = syncType;
    syncType();

    // 默认日期
    document.getElementById('date').value = new Date().toISOString().slice(0, 10);

    // ---- 图片拖拽上传 ----
    let uploadedImage = '';
    const dropZone = document.getElementById('dropZone');
    const dropText = document.getElementById('dropText');
    const preview = document.getElementById('preview');
    const fileInput = document.getElementById('fileInput');
    const uploadStatus = document.getElementById('uploadStatus');

    dropZone.onclick = () => fileInput.click();
    fileInput.onchange = () => { if (fileInput.files[0]) handleFile(fileInput.files[0]); };
    ['dragenter', 'dragover'].forEach(ev =>
      dropZone.addEventListener(ev, e => { e.preventDefault(); dropZone.classList.add('hover'); }));
    ['dragleave', 'drop'].forEach(ev =>
      dropZone.addEventListener(ev, e => { e.preventDefault(); dropZone.classList.remove('hover'); }));
    dropZone.addEventListener('drop', e => {
      const f = e.dataTransfer.files[0];
      if (f) handleFile(f);
    });

    function fileToB64(file) {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onerror = reject;
        reader.onload = () => {
          const bytes = new Uint8Array(reader.result);
          let binary = '';
          for (let i = 0; i < bytes.length; i++) binary += String.fromCharCode(bytes[i]);
          resolve(btoa(binary));
        };
        reader.readAsArrayBuffer(file);
      });
    }

    async function handleFile(file) {
      if (!file.type.startsWith('image/')) {
        uploadStatus.textContent = '请选择图片文件。';
        return;
      }
      const pat = localStorage.getItem('gh_pat');
      if (!pat) { uploadStatus.textContent = '请先保存 PAT 再上传图片。'; return; }

      preview.src = URL.createObjectURL(file);
      preview.classList.remove('hidden');
      dropText.style.display = 'none';
      uploadStatus.textContent = '正在上传图片……';

      try {
        const ext = (file.name.split('.').pop() || 'jpg').toLowerCase();
        const fname = 'images/' + Date.now() + '.' + ext;
        const b64 = await fileToB64(file);
        const API = `https://api.github.com/repos/${REPO}/contents/${fname}`;
        const put = await fetch(API, {
          method: 'PUT',
          headers: { 'Authorization': 'Bearer ' + pat, 'Content-Type': 'application/json' },
          body: JSON.stringify({ message: 'Upload image: ' + fname, content: b64, branch: BRANCH })
        });
        if (put.ok) {
          uploadedImage = fname;
          uploadStatus.textContent = '图片已上传：' + fname;
        } else {
          const err = await put.json().catch(() => ({}));
          uploadedImage = '';
          uploadStatus.textContent = '图片上传失败，HTTP ' + put.status + '：' + (err.message || '') + '（发布时将不含图片）';
        }
      } catch (e) {
        uploadedImage = '';
        uploadStatus.textContent = '图片上传出错：' + e.message;
      }
    }

    // UTF-8 安全 base64
    function toB64(str) { return btoa(unescape(encodeURIComponent(str))); }
    function fromB64(b64) { return decodeURIComponent(escape(atob(b64))); }

    document.getElementById('publish').onclick = async () => {
      const pat = localStorage.getItem('gh_pat');
      if (!pat) { alert('请先填写并保存 PAT'); return; }
      const t = typeSel.value;
      const title = titleInput.value.trim();
      const author = document.getElementById('author').value.trim();
      const role = roleInput.value.trim();
      const date = document.getElementById('date').value;
      const content = document.getElementById('content').value.trim();
      const msg = document.getElementById('msg');

      if (t === 'members') {
        if (!title) { alert('游戏 ID 不能为空'); return; }
      } else {
        if (!title || !content) { alert('标题和内容不能为空'); return; }
      }

      let item;
      if (t === 'news') item = { title, author: author || undefined, date, image: uploadedImage || undefined, content };
      else if (t === 'articles') item = { title, author: author || undefined, date, content };
      else if (t === 'gallery') item = { title, builder: role || undefined, author: author || undefined, date, image: uploadedImage || undefined, content };
      else item = { id: title, role: role || undefined, intro: content, author: author || undefined };

      const PATH = PATHS[t];
      const API = `https://api.github.com/repos/${REPO}/contents/${PATH}`;
      msg.style.color = '#444';
      msg.textContent = '正在读取现有数据……';

      try {
        const res = await fetch(API, { headers: { 'Authorization': 'Bearer ' + pat } });
        let list = [], sha = null;
        if (res.status === 200) {
          const data = await res.json();
          try { list = JSON.parse(fromB64(data.content)); } catch (e) { list = []; }
          if (!Array.isArray(list)) list = [];
          sha = data.sha;
        } else if (res.status === 404) {
          list = [];
        } else {
          msg.style.color = '#b71c1c';
          msg.textContent = '读取失败，HTTP ' + res.status + '（检查 PAT 权限 / 仓库名）';
          return;
        }

        list.unshift(item);
        const body = {
          message: 'Add ' + t + ': ' + title,
          content: toB64(JSON.stringify(list, null, 2)),
          branch: BRANCH
        };
        if (sha) body.sha = sha;

        msg.textContent = '正在提交到 GitHub……';
        const put = await fetch(API, {
          method: 'PUT',
          headers: { 'Authorization': 'Bearer ' + pat, 'Content-Type': 'application/json' },
          body: JSON.stringify(body)
        });
        if (put.ok) {
          msg.style.color = '#2e7d32';
          msg.textContent = '发布成功！等待 GitHub Pages 构建（约 1 分钟）后刷新对应页面即可看到。';
          titleInput.value = '';
          document.getElementById('author').value = '';
          roleInput.value = '';
          document.getElementById('content').value = '';
          uploadedImage = '';
          preview.classList.add('hidden');
          preview.src = '';
          dropText.style.display = '';
          uploadStatus.textContent = '';
        } else {
          const err = await put.json().catch(() => ({}));
          msg.style.color = '#b71c1c';
          msg.textContent = '发布失败，HTTP ' + put.status + '：' + (err.message || '');
        }
      } catch (e) {
        msg.style.color = '#b71c1c';
        msg.textContent = '出错：' + e.message;
      }
    };
  </script>
</body>
</html>
